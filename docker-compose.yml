version: '3.8'
services:
  cyber-snake:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: cyber-snake:latest
    container_name: cyber-snake
    ports:
      - "${PORT:-8300}:8300"
    environment:
      - PORT=${PORT:-8300}
      - RUST_LOG=${RUST_LOG:-info}
      - TZ=${TZ:-UTC}
      - MAX_PLAYERS=${MAX_PLAYERS:-50}
      - TICK_RATE=${TICK_RATE:-20}
      - COLS=${COLS:-100}
      - ROWS=${ROWS:-100}
    volumes:
      - cyber-snake-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  cyber-snake-data:
    driver: local

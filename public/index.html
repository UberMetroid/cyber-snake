<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER_SNAKE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #0ff;
    padding: 10px;
    touch-action: none; /* Prevents pull-to-refresh and zooming on mobile */
  }
  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 600px;
  }
  #header {
    width: 100%;
    padding: 10px 0;
    display: flex;
    justify-content: center;
  }
  #spawnBtn {
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    padding: 12px 40px;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    cursor: pointer;
    text-shadow: 0 0 10px #0ff;
    letter-spacing: 4px;
    transition: all 0.2s;
  }
  #spawnBtn:hover:not(:disabled) {
    background: rgba(0, 255, 255, 0.15);
    box-shadow: 0 0 30px #0ff;
  }
  #spawnBtn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    border: 2px solid #0ff;
    box-shadow: 0 0 20px #0ff, inset 0 0 20px rgba(0, 255, 255, 0.1);
  }
  #stats {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    font-size: 12px; /* Smaller for mobile fit */
    letter-spacing: 1px;
    flex-wrap: wrap;
  }
  #stats .label { color: #0ff; text-shadow: 0 0 10px #0ff; }
  #stats .value { color: #fff; min-width: 40px; text-align: right; }
  #stats .stat-item { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
  #powerup-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #powerup-indicator .label { color: #0ff; text-shadow: 0 0 10px #0ff; }
  #powerup-box {
    width: 30px;
    height: 30px;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  #powerup-box.has-powerup { border-color: #0ff; box-shadow: 0 0 10px currentColor; }
  #super-meter-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #super-meter-container .label { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
  #super-meter-bar {
    width: 80px;
    height: 16px;
    border: 2px solid #ffff00;
    background: rgba(0,0,0,0.5);
    position: relative;
  }
  #super-meter-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffff00, #ff00ff);
    width: 0%;
    transition: width 0.2s;
  }
  #super-meter-bar.active {
    box-shadow: 0 0 15px #ffff00;
    animation: superPulse 0.5s infinite;
  }
  @keyframes superPulse {
    0%, 100% { box-shadow: 0 0 15px #ffff00; }
    50% { box-shadow: 0 0 25px #ff00ff; }
  }
  #scoreboard {
    width: 100%;
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid #0ff;
    padding: 10px;
    font-size: 12px;
    margin-bottom: 10px;
  }
  #scoreboard h3 {
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
    margin-bottom: 10px;
    font-size: 14px;
    letter-spacing: 2px;
  }
  .player-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid rgba(0, 255, 255, 0.2);
  }
  .player-row .name { color: #fff; }
  .player-row .points { color: #0ff; }
  .player-row.dead .name { text-decoration: line-through; opacity: 0.5; }
  .player-row.self .name { color: #fff; }
  
  /* Mobile D-Pad Controls */
  #mobileControls {
    display: none;
    width: 100%;
    justify-content: center;
    margin-top: 10px;
  }
  @media (pointer: coarse) {
    #mobileControls {
      display: flex;
    }
  }
  .dpad {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .dpad-row {
    display: flex;
    gap: 8px;
  }
  .dbtn {
    background: rgba(0, 255, 255, 0.1);
    border: 2px solid #0ff;
    color: #0ff;
    width: 60px;
    height: 60px;
    font-size: 24px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: manipulation;
    user-select: none;
  }
  .dbtn:active {
    background: rgba(0, 255, 255, 0.4);
    box-shadow: 0 0 15px #0ff;
  }
  .dbtn.action {
    background: rgba(255, 0, 255, 0.1);
    border-color: #f0f;
    color: #f0f;
  }
  .dbtn.action:active {
    background: rgba(255, 0, 255, 0.4);
    box-shadow: 0 0 15px #f0f;
  }
  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 8, 0.9);
    z-index: 100;
  }
  #overlay.show { display: flex; }
  #overlayContent {
    text-align: center;
    padding: 40px;
    border: 1px solid #0ff;
    background: rgba(5, 5, 8, 0.95);
  }
  #overlayContent h1 {
    font-size: 32px;
    margin-bottom: 15px;
    letter-spacing: 4px;
  }
  #overlayContent p {
    font-size: 14px;
    margin-bottom: 15px;
  }
  #overlayContent .blink {
    animation: blink 1s infinite;
  }
  #overlayContent button {
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    padding: 12px 30px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    text-shadow: 0 0 10px #0ff;
    letter-spacing: 3px;
    margin-top: 10px;
  }
  #overlayContent button:hover {
    background: rgba(0, 255, 255, 0.15);
    box-shadow: 0 0 30px #0ff;
  }
  #overlayContent.dead h1 { color: #ff0044; text-shadow: 0 0 10px #ff0044; }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  #adminPanel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.95);
    border: 1px solid #0ff;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    padding: 20px;
    width: 400px;
    z-index: 200;
  }
  #adminPanel.show { display: block; }
  #adminPanel h3 { color: #0ff; text-shadow: 0 0 10px #0ff; margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 5px; }
  #adminContent { margin-bottom: 20px; font-size: 14px; line-height: 1.5; color: #fff; }
  #adminContent strong { color: #0ff; }
  #adminCloseBtn {
    background: transparent; border: 1px solid #0ff; color: #0ff; padding: 5px 15px; cursor: pointer; font-family: 'Courier New', monospace; width: 100%;
  }
  #adminCloseBtn:hover { background: rgba(0, 255, 255, 0.15); box-shadow: 0 0 10px #0ff; }
 </style>
</head>
<body>
<div id="container">
  <div id="header">
    <button id="spawnBtn" disabled>SPAWN</button>
  </div>
  <canvas id="game" width="600" height="600"></canvas>
  <div id="stats">
    <div class="stat-item">
      <span class="label">SCORE:</span>
      <span class="value" id="scoreValue">0</span>
    </div>
    <div class="stat-item">
      <span class="label">PLAYERS:</span>
      <span class="value" id="playerCount">0/0</span>
    </div>
    <div id="powerup-indicator" class="stat-item">
      <span class="label">POWERUP:</span>
      <div id="powerup-box"></div>
    </div>
    <div id="super-meter-container" class="stat-item">
      <span class="label">SUPER:</span>
      <div id="super-meter-bar"><div id="super-meter-fill"></div></div>
    </div>
  </div>
  <div id="debug" style="display:none; width:600px; background:rgba(0,0,0,0.8); border:1px solid #0ff; padding:5px; font-size:11px; color:#0ff;"></div>
  <div id="mobileControls">
    <div class="dpad">
      <div id="btnUp" class="dbtn">▲</div>
      <div class="dpad-row">
        <div id="btnLeft" class="dbtn">◀</div>
        <div id="btnAction" class="dbtn action">■</div>
        <div id="btnRight" class="dbtn">▶</div>
      </div>
      <div id="btnDown" class="dbtn">▼</div>
    </div>
  </div>
  
  <div id="scoreboard">
    <h3>// SCOREBOARD</h3>
    <div id="scores"></div>
  </div>
</div>

<div id="adminPanel">
  <h3>// SYSTEM ADMIN</h3>
  <div id="adminContent">Loading stats...</div>
  <button id="adminCloseBtn">CLOSE</button>
</div>

<div id="overlay">
  <div id="overlayContent">
    <h1 id="overlayTitle">TERMINATED</h1>
    <p id="overlayMsg">SCORE: 0</p>
    <button id="overlayBtn">RESPAWN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
const spawnBtn = document.getElementById('spawnBtn');
const scoreValue = document.getElementById('scoreValue');
const scoresEl = document.getElementById('scores');
const overlay = document.getElementById('overlay');
const overlayContent = document.getElementById('overlayContent');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const overlayBtn = document.getElementById('overlayBtn');
const powerupBox = document.getElementById('powerup-box');
const superMeterFill = document.getElementById('super-meter-fill');
const superMeterBar = document.getElementById('super-meter-bar');
const debugEl = document.getElementById('debug');
const adminPanel = document.getElementById('adminPanel');
const adminContent = document.getElementById('adminContent');
const adminCloseBtn = document.getElementById('adminCloseBtn');

const GRID = 20;
const COLS = 30;
const ROWS = 30;

let ws = null;
let myId = null;
let myColor = '#00ff88';
let myName = '';
let gameState = { snakes: {}, foods: {}, bonusFoods: [], powerups: [], tick: 0 };
let prevGameState = { snakes: {}, foods: {}, bonusFoods: [], powerups: [], tick: 0 };
let alive = true;
let spawned = false;
let score = 0;
let deathReason = null;
let heldPowerup = null;
let activeEffects = {};
let explosions = [];
let superMeter = 0;
let superModeActive = false;
let lastServerUpdate = 0;
let serverTickInterval = 1000 / 20;
let debugMode = false;
let lastPing = 0;
let frameCount = 0;
let fps = 0;
let lastFpsUpdate = Date.now();
let connected = false;

const POWERUP_COLORS = { SPEED: '#ffff00', SHIELD: '#00ffff', BOMB: '#ff0000', GHOST: '#9900ff', MAGNET: '#ff00ff', GROW: '#00ff00', SHRINK: '#ff8800' };
const POWERUP_SHAPES = { SPEED: '⚡', SHIELD: '🛡️', BOMB: '💣', GHOST: '👻', MAGNET: '🧲', GROW: '⬆️', SHRINK: '⬇️' };

const DEATH_MESSAGES = {
  'WALL': 'WALL COLLISION',
  'SELF': 'SELF COLLISION',
  'SNAKE': 'SNAKE COLLISION',
  'HEAD_TO_HEAD': 'HEAD TO HEAD',
  'BOMB': 'BOMB KILL',
  'RAM': 'RAMMED',
  'GHOST_OUT': 'GHOST WALL'
};

function showOverlay(cls, title, msg) {
  overlayContent.className = cls;
  overlayTitle.textContent = title;
  overlayMsg.innerHTML = msg;
  overlay.classList.add('show');
}

function hideOverlay() {
  overlay.classList.remove('show');
}

function send(type, data = {}) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type, ...data }));
  }
}

function connect() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${window.location.host}/ws`;

  ws = new WebSocket(wsUrl);  
  ws.onopen = () => {
    console.log('[WS] Connected to server');
    connected = true;
  };
  
  ws.onclose = () => {
    console.log('[WS] Disconnected from server');
    connected = false;
    spawnBtn.disabled = true;
    showOverlay('', 'DISCONNECTED', 'Connection lost<br><button onclick="location.reload()">RELOAD</button>');
  };
  
  ws.onerror = (err) => {
    console.error('[WS] Error:', err);
  };
  
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch (e) {
      console.error('[WS] Parse error:', e);
    }
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      myId = msg.id;
      myColor = msg.snake.color;
      myName = msg.snake.name;
      spawnBtn.disabled = false;
      spawnBtn.onclick = spawn;
      console.log('[WS] Welcome:', myColor, myName);
      break;
      
    case 'gameState':
      prevGameState = JSON.parse(JSON.stringify(gameState));
      lastServerUpdate = Date.now();
      gameState = {
        snakes: msg.snakes || {},
        foods: msg.foods || {},
        bonusFoods: msg.bonusFoods || [],
        powerups: msg.powerups || [],
        tick: msg.tick || 0
      };
      if (msg.explosions) {
        explosions = msg.explosions;
      }
      updateUI();
      break;
      
    case 'pong':
      lastPing = Date.now() - lastPing;
      break;
  }
}

function spawn() {
  if (spawned) return;
  spawned = true;
  spawnBtn.disabled = true;
  spawnBtn.textContent = 'SPAWNED';
  send('spawn');
}

function respawn() {
  hideOverlay();
  send('respawn');
}

function updateUI() {
  const me = gameState.snakes[myId];
  if (me) {
    score = me.score;
    alive = me.alive;
    spawned = me.spawned;
    deathReason = me.deathReason;
    heldPowerup = me.heldPowerup;
    activeEffects = me.activeEffects || {};
    superMeter = me.superMeter || 0;
    const now = Date.now();
    superModeActive = me.activeEffects && me.activeEffects.superMode && me.activeEffects.superMode > now;
  }
  scoreValue.textContent = score;
  
  superMeterFill.style.width = superMeter + '%';
  if (superModeActive) {
    superMeterBar.classList.add('active');
    superMeterFill.style.width = '100%';
  } else {
    superMeterBar.classList.remove('active');
  }
  
  if (heldPowerup) {
    powerupBox.textContent = POWERUP_SHAPES[heldPowerup] || '?';
    powerupBox.style.color = POWERUP_COLORS[heldPowerup] || '#fff';
    powerupBox.classList.add('has-powerup');
  } else {
    powerupBox.textContent = '';
    powerupBox.style.color = '';
    powerupBox.classList.remove('has-powerup');
  }

  const players = Object.values(gameState.snakes);
  const spawnedPlayers = players.filter(p => p.spawned);
  const alivePlayers = spawnedPlayers.filter(p => p.alive);
  document.getElementById('playerCount').textContent = `${alivePlayers.length}/${players.length}`;

  players.sort((a, b) => b.score - a.score);
  scoresEl.innerHTML = '';
  for (const [id, p] of Object.entries(gameState.snakes)) {
    const div = document.createElement('div');
    div.className = 'player-row';
    if (id === myId) div.classList.add('self');
    if (!p.alive) div.classList.add('dead');
    if (!p.spawned) div.classList.add('notspawned');
    div.innerHTML = `<span class="name" style="color:${p.color}">${p.color}</span><span class="points">${p.score}</span>`;
    scoresEl.appendChild(div);
  }

  if (!alive && spawned && !overlay.classList.contains('show')) {
    const reasonMsg = deathReason ? (DEATH_MESSAGES[deathReason] || deathReason) : 'UNKNOWN';
    showOverlay('dead', 'TERMINATED', `${reasonMsg}<br>SCORE: ${score}<br><span class="blink">[ PRESS SPACE OR CLICK TO RESPAWN ]</span>`);
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }
}

function drawFood() {
  const now = Date.now();
  const pulse = Math.sin(now / 200) * 0.3 + 0.7;
  const elapsed = now - lastServerUpdate;
  const t = Math.min(1, elapsed / serverTickInterval);

  for (const [ownerId, food] of Object.entries(gameState.foods)) {
    if (!food) continue;
    const isMyFood = ownerId === myId;
    
    let drawX = food.x;
    let drawY = food.y;
    const prevFood = prevGameState.foods ? prevGameState.foods[ownerId] : null;
    if (prevFood) {
      drawX = prevFood.x + (food.x - prevFood.x) * t;
      drawY = prevFood.y + (food.y - prevFood.y) * t;
    }
    
    const cx = drawX * GRID + GRID / 2;
    const cy = drawY * GRID + GRID / 2;
    
    ctx.shadowColor = food.color;
    ctx.shadowBlur = isMyFood ? 25 : 15;
    ctx.fillStyle = food.color;
    ctx.strokeStyle = food.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = isMyFood ? 1 : 0.8;
    
    if (food.isRing) {
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2, 0, Math.PI * 2);
      ctx.stroke();
    } else if (food.isSuper) {
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2 + 2, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawSnakes() {
  const now = Date.now();
  const elapsed = now - lastServerUpdate;
  const t = Math.min(1, elapsed / serverTickInterval);
  
  for (const [id, snake] of Object.entries(gameState.snakes)) {
    if (!snake.spawned) continue;
    const isMe = id === myId;
    const effects = snake.activeEffects || {};
    const ghostActive = effects.ghost && effects.ghost > now;
    
    if (ghostActive && !isMe) continue;
    
    const shieldActive = effects.shield && effects.shield > now;
    const speedActive = effects.speedBoost && effects.speedBoost > now;
    
    ctx.shadowColor = snake.color;
    ctx.shadowBlur = isMe ? 25 : 12;
    ctx.fillStyle = snake.color;

    if (ghostActive) {
      ctx.globalAlpha = 0.4;
    } else if (!snake.alive) {
      ctx.globalAlpha = 0.3;
    } else {
      ctx.globalAlpha = Math.max(0.3, 1 - snake.segments.length * 0.01);
    }

    const prevSnake = prevGameState.snakes[id];
    snake.segments.forEach((seg, i) => {
      let drawX = seg.x;
      let drawY = seg.y;
      
      if (prevSnake && prevSnake.segments && prevSnake.segments[i]) {
        const prevSeg = prevSnake.segments[i];
        drawX = prevSeg.x + (seg.x - prevSeg.x) * t;
        drawY = prevSeg.y + (seg.y - prevSeg.y) * t;
      }
      
      ctx.fillRect(drawX * GRID + 1, drawY * GRID + 1, GRID - 2, GRID - 2);
    });

    let headX = snake.segments[0].x;
    let headY = snake.segments[0].y;
    if (prevSnake && prevSnake.segments && prevSnake.segments[0]) {
      headX = prevSnake.segments[0].x + (snake.segments[0].x - prevSnake.segments[0].x) * t;
      headY = prevSnake.segments[0].y + (snake.segments[0].y - prevSnake.segments[0].y) * t;
    }

    if (shieldActive && snake.alive) {
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 15;
      ctx.strokeRect(headX * GRID - 1, headY * GRID - 1, GRID + 2, GRID + 2);
    }

    if (speedActive && snake.alive) {
      ctx.fillStyle = '#ffff00';
      ctx.shadowColor = '#ffff00';
      ctx.globalAlpha = 0.6;
      for (let i = 1; i <= 3; i++) {
        const trail = snake.segments[i];
        const prevTrail = prevSnake && prevSnake.segments ? prevSnake.segments[i] : null;
        if (trail) {
          let tx = trail.x;
          let ty = trail.y;
          if (prevTrail) {
            tx = prevTrail.x + (trail.x - prevTrail.x) * t;
            ty = prevTrail.y + (trail.y - prevTrail.y) * t;
          }
          ctx.fillRect(tx * GRID + 3, ty * GRID + 3, GRID - 6, GRID - 6);
        }
      }
    }

    const slowedActive = effects.slowed && effects.slowed > now;
    if (slowedActive && snake.alive) {
      const pulse = Math.sin(now / 100) * 0.3 + 0.7;
      ctx.strokeStyle = `rgba(255, 0, 0, ${pulse})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 10;
      ctx.strokeRect(headX * GRID - 2, headY * GRID - 2, GRID + 4, GRID + 4);
    }

    const magnetActive = effects.magnet && effects.magnet > now;
    if (magnetActive && snake.alive) {
      const pulse = Math.sin(now / 80) * 0.2 + 0.4;
      ctx.strokeStyle = `rgba(255, 0, 255, ${pulse})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 15;
      const cx = headX * GRID + GRID / 2;
      const cy = headY * GRID + GRID / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, GRID * 5, 0, Math.PI * 2);
      ctx.stroke();
    }

    const superActive = effects.superMode && effects.superMode > now;
    if (superActive && snake.alive) {
      const pulse = Math.sin(now / 50) * 0.3 + 0.7;
      const hue = (now / 10) % 360;
      ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
      ctx.shadowBlur = 30 * pulse;
      ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${pulse})`;
      ctx.lineWidth = 4;
      ctx.strokeRect(headX * GRID - 4, headY * GRID - 4, GRID + 8, GRID + 8);
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

function drawPowerup() {
  if (!gameState.powerups || gameState.powerups.length === 0) return;
  const now = Date.now();
  const pulse = Math.sin(now / 150) * 0.3 + 0.7;
  
  for (const p of gameState.powerups) {
    const cx = p.x * GRID + GRID / 2;
    const cy = p.y * GRID + GRID / 2;
    
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = p.color;
    
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const type = p.powerupType || p.type;
    if (type === 'SPEED') {
      ctx.fillText('⚡', cx, cy);
    } else if (type === 'SHIELD') {
      ctx.fillText('🛡️', cx, cy);
    } else if (type === 'BOMB') {
      ctx.fillText('💣', cx, cy);
    } else if (type === 'GHOST') {
      ctx.globalAlpha = pulse;
      ctx.fillText('👻', cx, cy);
      ctx.globalAlpha = 1;
    } else if (type === 'MAGNET') {
      ctx.fillText('🧲', cx, cy);
    } else if (type === 'GROW') {
      ctx.fillText('⬆️', cx, cy);
    } else if (type === 'SHRINK') {
      ctx.fillText('⬇️', cx, cy);
    }
  }
  
  ctx.shadowBlur = 0;
}

function drawBonusFoods() {
  const now = Date.now();
  const pulse = Math.sin(now / 200) * 0.3 + 0.7;
  const elapsed = now - lastServerUpdate;
  const t = Math.min(1, elapsed / serverTickInterval);

  for (const bf of gameState.bonusFoods) {
    let drawX = bf.x;
    let drawY = bf.y;
    
    const prevBf = prevGameState.bonusFoods ? prevGameState.bonusFoods.find(b => b.x === bf.x && b.y === bf.y) : null;
    if (prevBf) {
      drawX = prevBf.x + (bf.x - prevBf.x) * t;
      drawY = prevBf.y + (bf.y - prevBf.y) * t;
    }
    
    const cx = drawX * GRID + GRID / 2;
    const cy = drawY * GRID + GRID / 2;
    
    ctx.shadowColor = bf.color;
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = bf.color;
    ctx.strokeStyle = bf.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    
    if (bf.isRing) {
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(cx, cy, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.font = '10px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', cx, cy);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawExplosions() {
  const now = Date.now();
  for (const exp of explosions) {
    const timeLeft = exp.expiresAt - now;
    if (timeLeft <= 0) continue;
    
    // Calculate animation progress (0.0 to 1.0) based on 500ms total duration
    const progress = 1 - (timeLeft / 500);
    const currentRadius = (exp.radius * GRID) * Math.min(progress * 1.5, 1);
    const alpha = Math.max(0, 1 - progress);
    
    const cx = exp.x * GRID + GRID / 2;
    const cy = exp.y * GRID + GRID / 2;
    
    ctx.beginPath();
    ctx.arc(cx, cy, currentRadius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 0, 0, ${alpha * 0.3})`;
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(cx, cy, currentRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 100, 100, ${alpha})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

function draw() {
  frameCount++;
  const now = Date.now();
  if (now - lastFpsUpdate >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsUpdate = now;
    if (connected) {
      lastPing = Date.now();
      send('ping');
    }
  }

  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawFood();
  drawBonusFoods();
  drawPowerup();
  drawExplosions();
  drawSnakes();
  
  if (debugMode) {
    const elapsed = now - lastServerUpdate;
    const t = Math.min(1, elapsed / serverTickInterval);
    debugEl.innerHTML = `
      FPS: ${fps} | 
      TICK: ${gameState.tick} | 
      INTERP: ${(t * 100).toFixed(0)}% | 
      PING: ${lastPing}ms |
      SNAKES: ${Object.keys(gameState.snakes).length} |
      FOOD: ${Object.keys(gameState.foods).length} |
      POWERUPS: ${gameState.powerups ? gameState.powerups.length : 0}
    `;
  }
  
  requestAnimationFrame(draw);
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Backquote') {
    const isShowing = adminPanel.classList.toggle('show');
    if (isShowing) {
      adminContent.innerHTML = 'Loading stats...';
      Promise.all([
        fetch('/stats').then(r => r.json()).catch(() => ({})),
        fetch('/admin/highscores').then(r => r.json()).catch(() => ({}))
      ]).then(([stats, hs]) => {
        let html = `<strong>Uptime:</strong> ${stats.uptimeSeconds || 0}s<br>`;
        html += `<strong>Players Online:</strong> ${stats.playersOnline || 0} / ${stats.maxPlayers || 0}<br>`;
        html += `<strong>Tick:</strong> ${stats.tick || 0}<br>`;
        html += `<strong>Entities:</strong> Foods: ${stats.foods || 0}, Powerups: ${stats.powerups || 0}, Bonus: ${stats.bonusFoods || 0}<br><br>`;
        html += `<strong>// TOP SCORES</strong><br>`;
        if (hs.highscores && hs.highscores.length) {
          hs.highscores.forEach((h, i) => {
            html += `${i+1}. ${h.name} - ${h.score}<br>`;
          });
        } else {
          html += 'No high scores yet.<br>';
        }
        adminContent.innerHTML = html;
      });
    }
    e.preventDefault();
    return;
  }

  if (e.code === 'Space') {
    if (overlay.classList.contains('show')) {
      respawn();
    } else if (!spawned) {
      spawn();
    } else if (alive && heldPowerup) {
      send('activatePowerup');
    }
    e.preventDefault();
    return;
  }

  if (e.code === 'KeyD') {
    debugMode = !debugMode;
    debugEl.style.display = debugMode ? 'block' : 'none';
    console.log('[DEBUG] Debug mode:', debugMode ? 'ON' : 'OFF');
    return;
  }

  if (!alive || !spawned) return;

  let dir = null;
  switch (e.code) {
    case 'ArrowUp': dir = 'up'; break;
    case 'ArrowDown': dir = 'down'; break;
    case 'ArrowLeft': dir = 'left'; break;
    case 'ArrowRight': dir = 'right'; break;
  }

  if (dir) {
    send('input', { dir });
    e.preventDefault();
  }
});

function handleMobileInput(dir) {
  if (!alive || !spawned) return;
  send('input', { dir });
}
